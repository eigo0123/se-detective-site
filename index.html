<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エスイー探偵事務所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFF9F2;
    --accent: #C8833A;
    --accent-light: #F0C080;
    --dark: #2C2416;
    --mid: #6B5740;
    --light-brown: #D4B896;
    --green: #4A7C59;
    --text: #3D2F1F;
    --shadow: rgba(44,36,22,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background: linear-gradient(160deg, #FFF5E8 0%, #FAF0DC 40%, #F5E6CC 100%);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,131,58,0.12) 0%, transparent 70%);
    animation: float 8s ease-in-out infinite;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,124,89,0.08) 0%, transparent 70%);
    animation: float 10s ease-in-out infinite reverse;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  /* ── NAV ── */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 5%;
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'DM Serif Display', 'Noto Serif JP', serif;
    font-size: 1.5rem;
    color: var(--dark);
    text-decoration: none;
    letter-spacing: 0.02em;
  }

  .logo span {
    display: block;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--mid);
    margin-top: 2px;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--mid);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  .nav-links a:hover { color: var(--accent); }

  .nav-cta {
    background: var(--accent);
    color: #fff !important;
    padding: 0.55rem 1.3rem;
    border-radius: 50px;
    transition: background 0.3s, transform 0.2s !important;
  }

  .nav-cta:hover {
    background: #A0622A !important;
    transform: translateY(-1px);
    color: #fff !important;
  }

  /* ── HERO CONTENT ── */
  .hero-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 5% 5rem;
    position: relative;
    z-index: 5;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(200,131,58,0.12);
    border: 1px solid rgba(200,131,58,0.3);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.08em;
    margin-bottom: 1.8rem;
    animation: fadeUp 0.8s ease both;
  }

  .hero-badge::before { content: '🔍'; }

  .hero-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 700;
    line-height: 1.3;
    color: var(--dark);
    margin-bottom: 1.2rem;
    animation: fadeUp 0.8s 0.1s ease both;
  }

  .hero-title em {
    font-style: normal;
    color: var(--accent);
    position: relative;
  }

  .hero-title em::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    border-radius: 2px;
  }

  .hero-sub {
    font-size: 1.05rem;
    color: var(--mid);
    line-height: 1.8;
    max-width: 520px;
    margin-bottom: 2.5rem;
    font-weight: 300;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .hero-btns {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 0.9rem 2.2rem;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(200,131,58,0.35);
  }

  .btn-primary:hover {
    background: #A0622A;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(200,131,58,0.4);
  }

  .btn-outline {
    background: transparent;
    color: var(--dark);
    padding: 0.9rem 2.2rem;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    border: 2px solid var(--light-brown);
    transition: all 0.3s;
  }

  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 3rem;
    margin-top: 4rem;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--accent);
    font-weight: 700;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--mid);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION BASE ── */
  section {
    padding: 5rem 5%;
  }

  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.35;
    margin-bottom: 1rem;
  }

  .section-desc {
    color: var(--mid);
    line-height: 1.9;
    font-weight: 300;
    max-width: 540px;
    font-size: 0.95rem;
  }

  /* ── ABOUT ── */
  .about {
    background: #fff;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    border-radius: 24px;
    padding: 4rem 5%;
    box-shadow: 0 8px 40px var(--shadow);
  }

  .about-visual {
    background: linear-gradient(135deg, #FFF0D8 0%, #FFE0B0 100%);
    border-radius: 20px;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6rem;
    position: relative;
    overflow: hidden;
  }

  .about-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(200,131,58,0.15) 0%, transparent 60%);
  }

  /* ── SERVICES ── */
  .services-section {
    background: var(--cream);
    text-align: center;
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
    max-width: 1000px;
    margin: 3rem auto 0;
  }

  .service-card {
    background: #fff;
    border-radius: 20px;
    padding: 2.2rem 1.8rem;
    text-align: left;
    transition: transform 0.3s, box-shadow 0.3s;
    border: 1px solid rgba(212,184,150,0.4);
  }

  .service-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px var(--shadow);
  }

  .service-icon {
    font-size: 2.2rem;
    margin-bottom: 1rem;
    display: block;
  }

  .service-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--dark);
    margin-bottom: 0.6rem;
  }

  .service-desc {
    font-size: 0.85rem;
    color: var(--mid);
    line-height: 1.8;
    font-weight: 300;
  }

  /* ── WHY ── */
  .why-section {
    background: linear-gradient(135deg, #2C2416 0%, #3D3020 100%);
    color: #fff;
    text-align: center;
  }

  .why-section .section-label { color: var(--accent-light); }
  .why-section .section-title { color: #fff; }
  .why-section .section-desc { color: rgba(255,255,255,0.65); max-width: 100%; }

  .why-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
    max-width: 900px;
    margin: 3rem auto 0;
  }

  .why-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    transition: background 0.3s;
  }

  .why-card:hover { background: rgba(200,131,58,0.15); }

  .why-icon { font-size: 2rem; margin-bottom: 0.8rem; display: block; }

  .why-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent-light);
    margin-bottom: 0.5rem;
  }

  .why-desc {
    font-size: 0.83rem;
    color: rgba(255,255,255,0.6);
    line-height: 1.8;
    font-weight: 300;
  }

  /* ── FLOW ── */
  .flow-section { text-align: center; }

  .flow-steps {
    display: flex;
    gap: 0;
    max-width: 900px;
    margin: 3rem auto 0;
    position: relative;
  }

  .flow-steps::before {
    content: '';
    position: absolute;
    top: 40px; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-light), var(--accent));
    z-index: 0;
  }

  .flow-step {
    flex: 1;
    text-align: center;
    position: relative;
    z-index: 1;
    padding: 0 0.5rem;
  }

  .step-num {
    width: 56px; height: 56px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
